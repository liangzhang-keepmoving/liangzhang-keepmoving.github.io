<?xml version='1.0' encoding='utf-8'?>
<svg width="640" height="480" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- 无人机路径 -->
    <path id="dronePath" d="M100,100 Q320,50 540,100 Q590,240 540,380 Q320,430 100,380 Q50,240 100,100" fill="none" stroke="none"/>
    
    <!-- 无人机1 -->
    <g id="drone1">
      <rect x="-15" y="-10" width="30" height="20" rx="2" fill="#3498db"/>
      <rect x="-25" y="-5" width="10" height="10" rx="2" fill="#2980b9"/>
      <rect x="15" y="-5" width="10" height="10" rx="2" fill="#2980b9"/>
      <circle cx="0" cy="0" r="3" fill="#e74c3c"/>
      <rect x="-8" y="-15" width="16" height="5" rx="1" fill="#34495e"/>
    </g>
    
    <!-- 无人机2 -->
    <g id="drone2">
      <rect x="-15" y="-10" width="30" height="20" rx="2" fill="#e74c3c"/>
      <rect x="-25" y="-5" width="10" height="10" rx="2" fill="#c0392b"/>
      <rect x="15" y="-5" width="10" height="10" rx="2" fill="#c0392b"/>
      <circle cx="0" cy="0" r="3" fill="#3498db"/>
      <rect x="-8" y="-15" width="16" height="5" rx="1" fill="#34495e"/>
    </g>
    
    <!-- IoT传感器 -->
    <g id="sensor">
      <circle cx="0" cy="0" r="8" fill="#2ecc71"/>
      <circle cx="0" cy="0" r="4" fill="#27ae60"/>
      <rect x="-2" y="-15" width="4" height="15" fill="#95a5a6"/>
      <rect x="-10" y="8" width="20" height="3" fill="#7f8c8d"/>
    </g>
    
    <!-- 地面充电站 -->
    <g id="chargingStation">
      <rect x="-30" y="-10" width="60" height="20" rx="2" fill="#f39c12"/>
      <rect x="-25" y="-25" width="50" height="15" rx="2" fill="#e67e22"/>
      <rect x="-15" y="-40" width="30" height="15" rx="2" fill="#d35400"/>
      <circle cx="-10" cy="-10" r="3" fill="#2ecc71"/>
      <circle cx="10" cy="-10" r="3" fill="#2ecc71"/>
    </g>
  </defs>
  
  <!-- 背景 -->
  <rect width="640" height="480" fill="#f0f0f0"/>
  
  <!-- 地面 -->
  <rect x="0" y="400" width="640" height="80" fill="#795548"/>
  
  <!-- 充电站1 -->
  <use xlink:href="#chargingStation" transform="translate(150, 400)"/>
  
  <!-- 充电站2 -->
  <use xlink:href="#chargingStation" transform="translate(490, 400)"/>
  
  <!-- IoT传感器 -->
  <use xlink:href="#sensor" transform="translate(100, 400)"/>
  <use xlink:href="#sensor" transform="translate(220, 400)"/>
  <use xlink:href="#sensor" transform="translate(340, 400)"/>
  <use xlink:href="#sensor" transform="translate(460, 400)"/>
  <use xlink:href="#sensor" transform="translate(580, 400)"/>
  
  <!-- 无人机1动画 -->
  <use xlink:href="#drone1">
    <animateMotion dur="20s" repeatCount="indefinite" path="M100,100 Q320,50 540,100 Q590,240 540,380 Q320,430 100,380 Q50,240 100,100"/>
    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
  </use>
  
  <!-- 无人机2动画 -->
  <use xlink:href="#drone2">
    <animateMotion dur="15s" repeatCount="indefinite" path="M150,150 Q320,80 490,150 Q520,240 490,330 Q320,380 150,330 Q120,240 150,150"/>
    <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="8s" repeatCount="indefinite"/>
  </use>
  
  <!-- 传感器闪烁动画 -->
  <animate xlink:href="#sensor" attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  
  <!-- 充电站灯光动画 -->
  <animate xlink:href="#chargingStation circle" attributeName="opacity" values="1;0.7;1" dur="1.5s" repeatCount="indefinite"/>
</svg>